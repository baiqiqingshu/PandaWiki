# Go API 后端
upstream backend {
    server 127.0.0.1:8000;
}

# Next.js App
upstream nextjs {
    server 127.0.0.1:3010;
}

server {
    listen 80;
    charset utf-8;

    # ---- SSE / 流式接口 (需要特殊的 proxy 设置) ----
    location ~ ^/(share/v1/chat/message|api/v1/creation/text)$ {
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;

        proxy_read_timeout 24h;
        proxy_send_timeout 24h;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_pass http://backend;
    }

    # ---- 文件上传 ----
    location = /api/v1/file/upload {
        proxy_pass http://backend;

        client_max_body_size 1000m;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    # ---- API 接口 ----
    location ~ ^/api {
        proxy_pass http://backend;

        client_max_body_size 1000m;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    # ---- Share 接口 ----
    location ~ ^/share {
        proxy_pass http://backend;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    # ---- MinIO 静态文件代理 ----
    location ~ ^/static-file/ {
        # MinIO 地址在环境变量中配置，默认走 docker compose 的 minio 容器
        set $minio_upstream "panda-wiki-minio:9000";
        proxy_pass http://$minio_upstream;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;

        client_max_body_size 1000m;

        if ($request_uri !~* \.pdf$) {
            add_header Content-Disposition "attachment" always;
        }

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;

        proxy_cache off;
        proxy_buffering off;
    }

    # ---- Next.js App 静态资源 ----
    location /panda-wiki-app-assets/ {
        proxy_pass http://nextjs;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    # ---- Next.js App (_next, monitoring 等) ----
    location /_next/ {
        proxy_pass http://nextjs;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    location /monitoring {
        proxy_pass http://nextjs;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
    }

    # ---- Admin 管理后台 (默认路径 /) ----
    location / {
        root /app/admin-dist;
        index index.html index.htm;
        try_files $uri $uri/ $uri.html /index.html;
        if ($request_filename ~* .*\.(htm|html)$) {
            add_header Cache-Control "no-cache";
        }
    }
}
