name: 构建并部署 PandaWiki

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/panda-wiki

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read
    steps:
      - name: 拉取代码（获取 docker-compose.yml）
        uses: actions/checkout@v4

      - name: 清理服务器旧部署
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== 清理旧部署 ==="
            if [ -d /opt/PandaWiki ]; then
              cd /opt/PandaWiki
              docker compose down -v --remove-orphans 2>/dev/null || true
              cd /
              rm -rf /opt/PandaWiki
            fi
            mkdir -p /opt/PandaWiki
            echo "=== 清理完成 ==="

      - name: 上传 docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.yml"
          target: "/opt/PandaWiki/"
          overwrite: true

      - name: 启动服务
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /opt/PandaWiki

            # 写入 .env 配置
            cat > .env << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF
            if grep -q '^RAG_PROVIDER=' .env; then
              sed -i 's/^RAG_PROVIDER=[[:space:]]*noop[[:space:]]*$/RAG_PROVIDER=fts/' .env
            else
              printf '\nRAG_PROVIDER=fts\n' >> .env
            fi

            # 登录 GHCR（GH_PAT 未配置时跳过，适用于 public 镜像）
            GH_PAT="${{ secrets.GH_PAT }}"
            if [ -n "$GH_PAT" ]; then
              echo "$GH_PAT" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
            else
              echo "GH_PAT not set, skipping GHCR login (public images only)"
            fi

            # 拉取镜像并启动
            docker compose pull
            docker compose up -d
            echo "=== 部署完成 ==="
            docker compose ps


